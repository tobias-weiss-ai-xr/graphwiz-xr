# Hub Client (Frontend) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-client
  namespace: graphwiz-xr
  labels:
    app: hub-client
    app.kubernetes.io/name: hub-client
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hub-client
  template:
    metadata:
      labels:
        app: hub-client
    spec:
      containers:
        - name: hub-client
          image: graphwiz-xr/hub-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: graphwiz-config
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '128Mi'
              cpu: '200m'
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: hub-client
  namespace: graphwiz-xr
  labels:
    app: hub-client
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: hub-client
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hub-client-ingress
  namespace: graphwiz-xr
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/proxy-body-size: '100m'
spec:
  tls:
    - hosts:
        - graphwiz-xr.example.com
      secretName: hub-client-tls
  rules:
    - host: graphwiz-xr.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hub-client
                port:
                  number: 80
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8001
          - path: /api/hub
            pathType: Prefix
            backend:
              service:
                name: hub
                port:
                  number: 8002
          - path: /api/presence
            pathType: Prefix
            backend:
              service:
                name: presence
                port:
                  number: 8003
          - path: /api/sfu
            pathType: Prefix
            backend:
              service:
                name: sfu
                port:
                  number: 8004
          - path: /api/storage
            pathType: Prefix
            backend:
              service:
                name: storage
                port:
                  number: 8005
          - path: /api/avatar
            pathType: Prefix
            backend:
              service:
                name: avatar
                port:
                  number: 8006
