# GraphWiz-XR Secrets
#
# IMPORTANT: In production, use sealed-secrets or external secrets manager
# These are development placeholders
apiVersion: v1
kind: Secret
metadata:
  name: graphwiz-secrets
  namespace: graphwiz-xr
type: Opaque
stringData:
  # Database credentials
  POSTGRES_USER: graphwiz
  POSTGRES_PASSWORD: graphwiz_dev_change_in_production
  DATABASE_URL: postgresql://graphwiz:graphwiz_dev_change_in_production@postgres:5432/graphwiz

  # Redis
  REDIS_URL: redis://redis:6379

  # JWT Configuration
  JWT_SECRET: your-super-secret-jwt-key-change-in-production
  JWT_EXPIRATION: '86400'

  # OAuth (if enabled)
  GITHUB_CLIENT_ID: ''
  GITHUB_CLIENT_SECRET: ''
  GOOGLE_CLIENT_ID: ''
  GOOGLE_CLIENT_SECRET: ''
  DISCORD_CLIENT_ID: ''
  DISCORD_CLIENT_SECRET: ''
